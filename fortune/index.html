<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fortune Wheel — Gunjan Patel</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="styles.css?v=20260430" />
</head>

<body class="theme-fortune">
  <div class="layout-wrapper flex flex-col min-h-screen">
    <!-- ─── Header ─── -->
    <header class="fixed top-0 left-0 right-0 z-50 h-14 flex items-center">
      <div class="max-w-4xl mx-auto w-full px-5 flex items-center justify-between">
        <!-- Logo -->
        <a href="/" class="flex items-center gap-2.5 group text-decoration-none">
          <img src="https://gravatar.com/avatar/a71d5c71e4c2236145ec0b8058bf9508?s=400" alt="Gunjan Patel"
            class="w-7 h-7 rounded-full object-cover border border-[rgba(255,255,255,0.1)]" />
          <span class="font-semibold text-sm text-[#f2f2f7]">Gunjan Patel</span>
        </a>

        <!-- Desktop nav -->
        <nav class="hidden md:flex items-center gap-7">
          <a href="https://gunjanpatel.info/about" class="nav-link">About</a>
          <a href="https://gunjanpatel.info/blog" class="nav-link">Blog</a>
          <a href="https://gunjanpatel.info/yoga" class="nav-link">Yoga</a>
          <div class="nav-dropdown">
            <button class="nav-link nav-dropdown-btn" type="button">Things I Built ▾</button>
            <div class="nav-dropdown-menu">
              <a href="https://learn.gunjanpatel.info">Learn</a>
              <a href="https://shop.gunjanpatel.info">Patel Flours</a>
            </div>
          </div>
          <a href="https://games.gunjanpatel.info" class="nav-link">🎮 Games</a>
        </nav>

        <!-- Socials (Mobile/Desktop) -->
        <div class="flex items-center gap-2">
          <a href="https://github.com/gunjanpatel" target="_blank"
            class="text-[rgba(235,235,245,0.50)] hover:text-[#a78bfa] transition-colors" title="GitHub">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path
                d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22">
              </path>
            </svg>
          </a>
        </div>
      </div>
    </header>

    <!-- ─── Main content ─── -->
    <main class="flex-1 pt-24 pb-12 px-5 flex flex-col items-center justify-center">

      <!-- SETUP SCREEN -->
      <section id="setupScreen" class="w-full max-w-2xl glass-panel p-6 md:p-10">
        <h1 class="mb-6 text-center text-3xl font-bold tracking-tight font-display">Create Your Wheel</h1>

        <div class="mb-6 grid gap-3 sm:grid-cols-[1fr_auto]">
          <select id="presetSelect"
            class="w-full rounded-xl border px-3 py-2 outline-none focus:ring-4 focus:ring-[#a78bfa]/25">
            <option value="">Choose a preset (optional)</option>
            <option value="birthday-questions">Birthday Party Questionnaire</option>
            <option value="kids-play">Kids Playing Challenges</option>
            <option value="icebreaker-questions">Fun Icebreaker Questions</option>
          </select>
          <div class="flex gap-2">
            <button id="applyPresetBtn" class="btn-primary" type="button">Apply</button>
            <button id="deletePresetBtn"
              class="btn-secondary hidden px-3 py-2 text-red-400 border-red-400/30 hover:border-red-400 hover:bg-red-400/10"
              type="button" title="Delete this saved preset">
              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M3 6h18M8 6V4h8v2M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6" />
              </svg>
            </button>
          </div>
        </div>

        <div class="mb-5">
          <button id="savePresetBtn" class="btn-secondary text-sm px-4 py-1.5" type="button"
            title="Save current items as a reusable preset">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24"
              stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M17 21H7a2 2 0 01-2-2V5a2 2 0 012-2h7l5 5v11a2 2 0 01-2 2z" />
              <polyline stroke-linecap="round" stroke-linejoin="round" points="17 21 17 13 7 13 7 21" />
              <polyline stroke-linecap="round" stroke-linejoin="round" points="7 3 7 8 15 8" />
            </svg>
            <span class="save-label">Save as Preset</span>
          </button>
        </div>

        <div id="itemsContainer" class="grid gap-3 mb-6"></div>

        <div class="mb-4 flex flex-col gap-3 sm:flex-row">
          <button id="addItemBtn" class="btn-secondary" type="button">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24"
              stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
            </svg>
            Add One
          </button>

          <button id="toggleBulkBtn" class="btn-secondary" type="button">
            Bulk Paste
          </button>
        </div>

        <div id="bulkEntryPanel"
          class="hidden mb-6 rounded-xl border border-[rgba(255,255,255,0.06)] bg-[rgba(28,28,30,0.4)] p-4">
          <textarea id="bulkItemsInput" rows="6" placeholder="One item per line"
            class="w-full min-h-[120px] resize-y rounded-xl border px-3 py-2 placeholder:text-[rgba(235,235,245,0.25)] outline-none focus:ring-4 focus:ring-[#a78bfa]/25"></textarea>
          <div class="mt-3 flex flex-col gap-2 sm:flex-row">
            <button id="cancelBulkBtn" class="btn-secondary text-sm px-4 py-2" type="button">Close</button>
          </div>
        </div>

        <div class="flex justify-end mt-8 border-t border-[rgba(255,255,255,0.08)] pt-6">
          <button id="nextBtn" class="btn-primary px-8">Next <span class="ml-1">→</span></button>
        </div>
      </section>

      <!-- WHEEL SCREEN -->
      <section id="wheelScreen" class="hidden flex flex-col w-full max-w-4xl items-center">
        <div class="w-[min(94vmin,600px)]">
          <div class="ui-wheel-of-fortune" id="fortuneWheel">
            <ul id="wheelItems"></ul>
            <button id="spinBtn" type="button" aria-label="Spin the wheel">SPIN</button>
          </div>
        </div>

        <button id="startOverBtn" class="mt-12 btn-secondary">
          Start Over
        </button>
      </section>
    </main>

    <!-- ─── Footer ─── -->
    <footer class="mt-auto border-t border-[rgba(255,255,255,0.08)]">
      <div class="max-w-4xl mx-auto px-5 py-12">
        <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-8">
          <div>
            <p class="font-display font-medium text-lg mb-1 text-[#f2f2f7]">
              वसुधैव कुटुम्बकम्
            </p>
            <p class="text-sm italic text-[rgba(235,235,245,0.50)]">
              The world is one family
            </p>
          </div>
          <div class="flex items-center gap-6">
            <a href="https://www.linkedin.com/in/jgunjanpatel/" target="_blank" rel="noopener noreferrer"
              class="text-sm font-medium flex items-center gap-1.5 transition-colors text-[rgba(235,235,245,0.50)] hover:text-[#a78bfa]">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path>
                <rect x="2" y="9" width="4" height="12"></rect>
                <circle cx="4" cy="4" r="2"></circle>
              </svg>
              LinkedIn
            </a>
            <a href="https://github.com/gunjanpatel" target="_blank" rel="noopener noreferrer"
              class="text-sm font-medium flex items-center gap-1.5 transition-colors text-[rgba(235,235,245,0.50)] hover:text-[#a78bfa]">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path
                  d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22">
                </path>
              </svg>
              GitHub
            </a>
          </div>
        </div>
        <p class="mt-10 text-xs text-[rgba(235,235,245,0.25)] font-mono">
          © 2026 GunjanPatel.info
        </p>
      </div>
    </footer>
  </div>

  <audio id="tickSound" src="assets/tick.mp3"></audio>

  <script src="app.js?v=20260531"></script>
  <script src="wheel.js?v=20260430"></script>
</body>

</html>
